asyncapi: 3.0.0

info:
  title: Fish Audio WebSocket TTS API
  version: 1.0.0
  description: |
    Real-time Text-to-Speech streaming via WebSocket using MessagePack serialization.

    ## Protocol Overview

    The WebSocket TTS endpoint enables bidirectional streaming for low-latency text-to-speech generation:

    1. **Client** connects to `/v1/tts/live` with model and auth headers
    2. **Client** sends StartEvent with TTS configuration
    3. **Client** streams TextEvent messages with text chunks
    4. **Server** streams back AudioEvent messages with generated audio
    5. **Client** sends CloseEvent to signal completion
    6. **Server** sends FinishEvent and closes connection

    ## Message Serialization

    All messages are serialized using **MessagePack** (binary format) before sending over the WebSocket.

    ## Common Use Cases

    - Conversational AI with streaming responses
    - Live captioning and narration
    - Real-time dubbing and voice-overs
    - Interactive voice applications

servers:
  production:
    host: api.fish.audio
    protocol: wss
    description: Fish Audio production WebSocket server
    security:
      - $ref: '#/components/securitySchemes/bearerAuth'

channels:
  ttsLive:
    address: /v1/tts/live
    messages:
      startEvent:
        $ref: '#/components/messages/StartEvent'
      textEvent:
        $ref: '#/components/messages/TextEvent'
      flushEvent:
        $ref: '#/components/messages/FlushEvent'
      closeEvent:
        $ref: '#/components/messages/CloseEvent'
      audioEvent:
        $ref: '#/components/messages/AudioEvent'
      finishEvent:
        $ref: '#/components/messages/FinishEvent'
    bindings:
      ws:
        headers:
          type: object
          required:
            - model
          properties:
            model:
              type: string
              enum:
                - s1
                - s2-pro
              description: TTS model to use for this session. Use `s2-pro` for multi-speaker dialogue synthesis.
    description: |
      Real-time TTS streaming channel. Clients send text chunks and receive audio chunks concurrently.

      ## Connection Headers
      - `Authorization: Bearer <api_key>` - Required for authentication (see security section)
      - `model: <model_name>` - Required to specify which TTS model to use (see bindings)

operations:
  receiveText:
    action: receive
    channel:
      $ref: '#/channels/ttsLive'
    messages:
      - $ref: '#/channels/ttsLive/messages/startEvent'
      - $ref: '#/channels/ttsLive/messages/textEvent'
      - $ref: '#/channels/ttsLive/messages/flushEvent'
      - $ref: '#/channels/ttsLive/messages/closeEvent'
    description: |
      Server receives text and control events from the client.

      **Event Sequence:**
      1. Client sends StartEvent once at the beginning with TTS configuration
      2. Client sends TextEvent for each text chunk to synthesize
      3. Client optionally sends FlushEvent to force immediate synthesis of buffered text
      4. Client sends CloseEvent when all text has been sent

  sendAudio:
    action: send
    channel:
      $ref: '#/channels/ttsLive'
    messages:
      - $ref: '#/channels/ttsLive/messages/audioEvent'
      - $ref: '#/channels/ttsLive/messages/finishEvent'
    description: |
      Server sends audio chunks and completion events to the client.

      **Event Flow:**
      - Server sends AudioEvent messages as audio is generated (multiple times)
      - Server sends FinishEvent once when synthesis completes
      - Clients should ignore unknown events to support future protocol extensions

components:
  messages:
    StartEvent:
      name: StartEvent
      title: Start TTS Session
      contentType: application/msgpack
      payload:
        type: object
        required:
          - event
          - request
        properties:
          event:
            type: string
            const: start
            description: Event type identifier
          request:
            $ref: '#/components/schemas/WebSocketTTSRequest'
      description: |
        Initiates a TTS streaming session with configuration.

        This must be the first message sent after connecting. It contains all the
        configuration for voice, audio format, and generation parameters.

        The `request` payload uses the same fields as the HTTP TTS API. In
        WebSocket mode, `request.text` is typically empty in the StartEvent and
        the actual text is streamed through subsequent TextEvent messages.

        For full parameter details, examples, and model-specific guidance, see
        the HTTP [Text to Speech API](/api-reference/endpoint/openapi-v1/text-to-speech).
      examples:
        - name: Basic Configuration
          payload:
            event: start
            request:
              text: ""
              format: mp3
              chunk_length: 300
              reference_id: "802e3bc2b27e49c2995d23ef70e6ac89"
              latency: normal
        - name: Full Configuration with All Options
          payload:
            event: start
            request:
              text: ""
              max_new_tokens: 1024
              top_p: 0.7
              repetition_penalty: 1.2
              temperature: 0.7
              min_chunk_length: 50
              chunk_length: 300
              condition_on_previous_chunks: true
              normalize: true
              early_stop_threshold: 1.0
              format: mp3
              sample_rate: 44100
              mp3_bitrate: 128
              opus_bitrate: -1000
              references: []
              reference_id: "802e3bc2b27e49c2995d23ef70e6ac89"
              latency: normal
              prosody:
                speed: 1.2
                volume: 2.0
                normalize_loudness: true
        - name: Voice Cloning with Reference Audio
          payload:
            event: start
            request:
              text: ""
              format: wav
              chunk_length: 250
              references:
                - audio: <binary audio data>
                  text: "This is the reference audio transcript."
              normalize: true
              latency: normal
              prosody:
                speed: 1.0
                volume: 0.0
                normalize_loudness: true

    TextEvent:
      name: TextEvent
      title: Send Text Chunk
      contentType: application/msgpack
      payload:
        type: object
        required:
          - event
          - text
        properties:
          event:
            type: string
            const: text
            description: Event type identifier
          text:
            type: string
            description: Text chunk to synthesize
      description: |
        Sends a chunk of text for synthesis.

        You can send multiple TextEvent messages in sequence. The server will buffer
        and synthesize text according to the chunk_length parameter from StartEvent.
      examples:
        - payload:
            event: text
            text: "Hello, this is streaming text. "

    FlushEvent:
      name: FlushEvent
      title: Flush Buffered Text
      contentType: application/msgpack
      payload:
        type: object
        required:
          - event
        properties:
          event:
            type: string
            const: flush
            description: Event type identifier
      description: |
        Forces immediate synthesis of all buffered text.

        Use this when you want audio generated immediately without waiting for more
        text or for the buffer to fill up. Useful for ensuring low latency in
        interactive applications.
      examples:
        - payload:
            event: flush

    CloseEvent:
      name: CloseEvent
      title: End TTS Session
      contentType: application/msgpack
      payload:
        type: object
        required:
          - event
        properties:
          event:
            type: string
            const: stop
            description: Event type identifier (note 'stop', not 'close')
      description: |
        Signals the end of the text stream.

        After sending this event, the server will finish synthesizing any remaining
        buffered text and send a FinishEvent before closing the connection.
      examples:
        - payload:
            event: stop

    AudioEvent:
      name: AudioEvent
      title: Audio Chunk
      contentType: application/msgpack
      payload:
        type: object
        required:
          - event
          - audio
        properties:
          event:
            type: string
            const: audio
            description: Event type identifier
          audio:
            type: string
            format: binary
            description: Audio bytes in the format specified in StartEvent (mp3, wav, pcm, or opus)
      description: |
        Contains generated audio bytes.

        You will receive multiple AudioEvent messages as audio is generated. Each
        message contains a chunk of audio in the format you specified. Concatenate
        all chunks to get the complete audio.
      examples:
        - payload:
            event: audio
            audio: <binary audio data>

    FinishEvent:
      name: FinishEvent
      title: Session Complete
      contentType: application/msgpack
      payload:
        type: object
        required:
          - event
          - reason
        properties:
          event:
            type: string
            const: finish
            description: Event type identifier
          reason:
            type: string
            enum:
              - stop
              - error
            description: |
              Completion reason:
              - 'stop': Normal completion
              - 'error': An error occurred during synthesis
      description: |
        Signals that the TTS session has completed.

        - If reason='stop', synthesis completed successfully
        - If reason='error', an error occurred (client should handle gracefully)

        The WebSocket connection will close after this event.
      examples:
        - payload:
            event: finish
            reason: stop
        - payload:
            event: finish
            reason: error

  schemas:
    WebSocketTTSRequest:
      type: object
      description: |
        Request payload for text-to-speech synthesis in WebSocket StartEvent.
        It uses the same parameters as the HTTP [Text to Speech API](/api-reference/endpoint/openapi-v1/text-to-speech).
        Supports single-speaker synthesis on all compatible TTS models.
        Multi-speaker dialogue synthesis is only available with `s2-pro`.
        In WebSocket mode, `text` is usually empty in StartEvent and the actual
        content is sent through subsequent TextEvent messages.
      required:
        - text
      properties:
        text:
          type: string
          description: |
            Text to convert to speech. For WebSocket streaming, this is
            typically empty in the StartEvent and the actual text is sent via
            TextEvent messages.

        max_new_tokens:
          type: integer
          default: 1024
          description: |
            Maximum audio tokens to generate per text chunk.

        temperature:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.7
          description: |
            Controls expressiveness. Higher is more varied, lower is more
            consistent.

        top_p:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.7
          description: |
            Controls diversity via nucleus sampling.

        repetition_penalty:
          type: number
          default: 1.2
          description: |
            Penalty for repeating audio patterns. Values above 1.0 reduce
            repetition.

        min_chunk_length:
          type: integer
          minimum: 0
          maximum: 100
          default: 50
          description: |
            Minimum characters before splitting into a new chunk.

        references:
          anyOf:
            - description: "Single speaker: array of reference audio samples"
              type: array
              items:
                $ref: '#/components/schemas/WebSocketReferenceAudio'
            - description: "Multiple speakers: array of arrays, where each inner array contains reference samples for one speaker"
              type: array
              items:
                type: array
                items:
                  $ref: '#/components/schemas/WebSocketReferenceAudio'
            - type: "null"
          description: |
            Inline voice references for zero-shot cloning. Single-speaker uses
            an array of ReferenceAudio. Multi-speaker uses an array of speaker
            arrays. Multi-speaker dialogue is only available with `s2-pro`.
            See the HTTP Text to Speech API page for detailed examples.

        reference_id:
          anyOf:
            - description: "Single speaker: voice model ID string"
              type: string
            - description: "Multiple speakers: array of voice model IDs, one per speaker"
              type: array
              items:
                type: string
            - type: "null"
          default: null
          description: |
            Voice model ID from Fish Audio or your custom models. Use a string
            for single-speaker synthesis, or an array of model IDs for
            multi-speaker dialogue on `s2-pro`. When using multiple speakers,
            add speaker tags in `text`. See the HTTP Text to Speech API page
            for full examples.

        prosody:
          oneOf:
            - $ref: '#/components/schemas/WebSocketProsodyControl'
            - type: "null"
          default: null
          description: Speed and volume adjustments for the output.

        chunk_length:
          type: integer
          minimum: 100
          maximum: 300
          default: 300
          description: |
            Text segment size for processing.

        condition_on_previous_chunks:
          type: boolean
          default: true
          description: |
            Use previous audio as context for voice consistency.

        normalize:
          type: boolean
          default: true
          description: |
            Normalizes text for English and Chinese, improving stability for
            numbers.

        early_stop_threshold:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 1.0
          description: |
            Early stopping threshold for batch processing.

        format:
          type: string
          enum:
            - wav
            - pcm
            - mp3
            - opus
          default: mp3
          description: Output audio format.

        sample_rate:
          type: [integer, "null"]
          default: null
          description: |
            Audio sample rate in Hz. When null, uses the format's default
            (44100 Hz for most formats, 48000 Hz for opus).

        mp3_bitrate:
          type: integer
          enum:
            - 64
            - 128
            - 192
          default: 128
          description: |
            MP3 bitrate in kbps. Only applies when format is mp3.

        opus_bitrate:
          type: integer
          enum:
            - -1000
            - 24
            - 32
            - 48
            - 64
          default: -1000
          description: |
            Opus bitrate in bps. -1000 for automatic. Only applies when format
            is opus.

        latency:
          type: string
          enum:
            - low
            - normal
            - balanced
          default: normal
          description: |
            Latency-quality trade-off. normal: best quality, balanced: reduced
            latency, low: lowest latency.

    WebSocketReferenceAudio:
      type: object
      required:
        - audio
        - text
      properties:
        audio:
          type: string
          format: binary
          description: Audio file bytes for the reference sample
        text:
          type: string
          description: |
            Transcription of what is spoken in the reference audio. Should match
            exactly what's spoken and include punctuation for proper prosody.

    WebSocketProsodyControl:
      type: object
      properties:
        speed:
          type: number
          minimum: 0.5
          maximum: 2.0
          default: 1.0
          description: |
            Speaking rate multiplier. Valid range: 0.5 to 2.0. 1.0 = normal
            speed, 0.5 = half speed, 2.0 = double speed. Useful for adjusting
            pacing without regenerating audio.
        volume:
          type: number
          minimum: -20.0
          maximum: 20.0
          default: 0.0
          description: |
            Volume adjustment in decibels (dB). 0 = no change, positive values
            = louder, negative values = quieter.
        normalize_loudness:
          type: boolean
          default: true
          description: |
            Normalize output loudness for more consistent perceived volume.
            S2-Pro only.

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        API key authentication using Bearer token.

        Get your API key from https://fish.audio/app/api-keys

        Pass the token in the Authorization header:
        `Authorization: Bearer YOUR_API_KEY`
